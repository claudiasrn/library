<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont/tabler-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/library.js" defer></script>
    <title>Library</title>
</head>
<body>
    <div class="shelves-container"></div>
    <dialog id="book-detail-dialog">
        <h1 id="detail-title"></h1>
        <p><strong>Author:</strong> <span id="detail-author"></span></p>
        <p><strong>Pages:</strong> <span id="detail-pages"></span></p>
        <p><strong>Genre:</strong> <span id="detail-genre"></span></p>
        <hr>
        <div class="toggle-row">
            <span>Read</span>
            <div class="toggle-pill-detail">
                <button id="toggle-read-btn"></button>
            </div>
        </div>
        <div class="dialog-actions">
            <button id="remove-book-btn">Remove</button>
            <button id="close-detail-btn">Close</button>
        </div>
    </dialog>
    <dialog id="add-book-dialog">
        <h1>New Book</h1>
        <form id="add-book-form">
            <div class="form-row">
            <label>
                Title
                <input type="text" name="title" required>
            </label>
            <label>
                Author
                <input type="text" name="author" required>
            </label>
            <label>
                Pages
                <input type="number" name="pages" min="1" required>
            </label>
            <label>
                Genre
                <input type="text" name="genre" required>
            </label>
            </div>

            <div class="toggle-row">
                <span>Read</span>
                <div class="toggle-pill-new">
                    <button type="button" id="new-book-toggle"></button>
                </div>
            </div>

            <hr>

            <div class="dialog-actions">
                <button type="button" id="cancel-add-btn">Cancel</button>
                <button type="submit" disabled>Add Book</button>
            </div>
        </form>
    </dialog>
</body>
</html>
